<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}RestaurantBI{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg px-4 py-2">
  <a class="navbar-brand" href="{{ url_for('menu') }}">
    <i class="bi bi-fork-knife me-1"></i>RestaurantBI
  </a>
  <button class="navbar-toggler border-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="nav">
    <ul class="navbar-nav ms-auto gap-1 align-items-center">
      <li class="nav-item">
        <a class="nav-link rounded-2 px-3 {% if request.endpoint == 'menu' %}active{% endif %}" href="{{ url_for('menu') }}">
          <i class="bi bi-journal-text me-1"></i>Menu
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link rounded-2 px-3 {% if request.endpoint == 'admin_dashboard' %}active{% endif %}" href="{{ url_for('admin_dashboard') }}">
          <i class="bi bi-speedometer2 me-1"></i>Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link rounded-2 px-3 {% if request.endpoint == 'admin_upload' %}active{% endif %}" href="{{ url_for('admin_upload') }}">
          <i class="bi bi-upload me-1"></i>Admin
        </a>
      </li>
      <li class="nav-item ms-lg-2">
        <button id="theme-toggle" class="btn btn-link nav-link px-2" title="Toggle Theme">
          <i class="bi bi-moon-stars" id="theme-icon"></i>
        </button>
      </li>
    </ul>
  </div>
</nav>

<script>
  // Immediate theme application
  (function() {
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  })();
</script>

<main class="container-xl py-4 px-3 px-md-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show rounded-3 mb-3" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script>
  const toggleBtn = document.getElementById('theme-toggle');
  const themeIcon = document.getElementById('theme-icon');
  
  function updateIcon(theme) {
    themeIcon.className = theme === 'dark' ? 'bi bi-sun' : 'bi bi-moon-stars';
  }

  // Initial icon state
  updateIcon(document.documentElement.getAttribute('data-theme'));

  toggleBtn.addEventListener('click', () => {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    
    document.documentElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    updateIcon(newTheme);
  });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
